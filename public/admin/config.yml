backend:
  name: github
  repo: ptminh-kmp/ptminh-kmp.github.io
  branch: main # Default branch

media_folder: "public/images" # Folder where to upload images
public_folder: "/images"

collections:
  - name: "posts"
    label: "Posts"
    folder: "src/content/posts"
    create: true
    slug: "{{title}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { 
          label: "Language", 
          name: "lang", 
          widget: "select", 
          options: [
            { label: "Tiếng Việt", value: "vi" },
            { label: "English", value: "en" }
          ],
          default: "vi"
        }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Author", name: "author", widget: "string", default: "minhpt" }
      - { label: "Publish Date", name: "published", widget: "datetime" }
      - { label: "Update Date", name: "updated", widget: "datetime", required: false }
      - { label: "Category", name: "category", widget: "string", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Image URL", name: "image", widget: "string", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Content", name: "body", widget: "markdown" }

  - name: "products"
    label: "Products"
    folder: "src/content/products"
    create: true
    slug: "{{title}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image URL", name: "image", widget: "string", required: false }
      - { label: "Platform", name: "platform", widget: "string", required: false }
      - { label: "Type", name: "type", widget: "select", options: ['Web', 'Mobile', 'Desktop', 'API', 'Library', 'Tool'], required: false }
      - { label: "Tech Stack", name: "techStack", widget: "list", required: false, field: { label: "Tech", name: "tech", widget: "string" } }
      - { label: "Status", name: "status", widget: "select", options: ['Active', 'Inactive', 'In Development', 'Maintenance'], required: false }
      - { label: "Demo URL", name: "demo", widget: "string", required: false }
      - { label: "Category", name: "category", widget: "string", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false, field: { label: "Tag", name: "tag", widget: "string" } }
      - { 
          label: "Language", 
          name: "lang", 
          widget: "select", 
          options: [
            { label: "Tiếng Việt", value: "vi" },
            { label: "English", value: "en" }
          ],
          default: "vi"
        }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Content", name: "body", widget: "markdown" }

  - name: "appArticles"
    label: "App Articles"
    folder: "src/content/appArticles"
    create: true
    slug: "{{app}}-{{title}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "App Name", name: "app", widget: "string" }
      - { 
          label: "Language", 
          name: "lang", 
          widget: "select", 
          options: [
            { label: "Tiếng Việt", value: "vi" },
            { label: "English", value: "en" }
          ],
          default: "vi"
        }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Publish Date", name: "published", widget: "datetime" }
      - { label: "Update Date", name: "updated", widget: "datetime", required: false }
      - { label: "Category", name: "category", widget: "string", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false, field: { label: "Tag", name: "tag", widget: "string" } }
      - { label: "Image URL", name: "image", widget: "string", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Content", name: "body", widget: "markdown" }
